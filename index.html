<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pierrot.show — Rencontres R</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: linear-gradient(180deg, #b8d8ea 0%, #d9edf7 50%, #e8f4fb 100%);
      position: relative;
    }

    /* ── Sun ── */
    .sun {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #ffd9008c 55%, #ffa600b8);
      border-radius: 50%;
      position: absolute;
      bottom: 35%;
      right: 0;
      z-index: 0;
      animation: sunArc 90s linear forwards;
      pointer-events: none;
      opacity: 0.85;
    }

    @keyframes sunArc {
      0%   { transform: translate(0, 0); }
      50%  { transform: translate(-50vw, -30vh); }
      100% { transform: translate(-100vw, 0); }
    }

    /* ── Clouds ── */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      animation: cloudFloat linear infinite;
      pointer-events: none;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud-1 {
      width: 130px; height: 38px;
      top: 9%; left: 100%;
      opacity: 0.88;
      animation-duration: 38s;
      animation-delay: -5s;
    }
    .cloud-1::before { width: 55px; height: 55px; top: -28px; left: 22px; }
    .cloud-1::after  { width: 38px; height: 38px; top: -17px; left: 62px; }

    .cloud-2 {
      width: 100px; height: 30px;
      top: 23%; left: 100%;
      opacity: 0.72;
      animation-duration: 58s;
      animation-delay: -18s;
    }
    .cloud-2::before { width: 42px; height: 42px; top: -22px; left: 18px; }
    .cloud-2::after  { width: 30px; height: 30px; top: -13px; left: 50px; }

    .cloud-3 {
      width: 165px; height: 44px;
      top: 4%; left: 100%;
      opacity: 0.82;
      animation-duration: 48s;
      animation-delay: -27s;
    }
    .cloud-3::before { width: 68px; height: 68px; top: -36px; left: 28px; }
    .cloud-3::after  { width: 50px; height: 50px; top: -22px; left: 85px; }

    .cloud-4 {
      width: 88px; height: 26px;
      top: 16%; left: 100%;
      opacity: 0.65;
      animation-duration: 70s;
      animation-delay: -40s;
    }
    .cloud-4::before { width: 36px; height: 36px; top: -18px; left: 14px; }
    .cloud-4::after  { width: 26px; height: 26px; top: -11px; left: 42px; }

    @keyframes cloudFloat {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(-100vw - 300px)); }
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background-color: #4169ed;
      z-index: 1;
    }

    /* ── Pierrot ── */
    .pierrot {
      position: absolute;
      bottom: 35%;
      left: 3%;
      width: 320px;
      height: 320px;
      z-index: 2;
      transform: translateY(40%);
    }

    /* ── Content ── */
    .content {
      position: absolute;
      inset: 0 0 35% 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0 1.5rem;
    }

    /* Title */
    .title {
      font-size: clamp(1.5rem, 3.5vw, 2.75rem);
      font-weight: 900;
      color: #1a1a2e;
      letter-spacing: -0.5px;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: titleDrop 0.7s cubic-bezier(0.2, 0.8, 0.3, 1.1) 0.2s forwards;
    }

    @keyframes titleDrop {
      from { opacity: 0; transform: translateY(-35px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Edition cards */
    .editions {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
      max-width: 500px;
    }

    .edition {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 0.75rem 1.25rem;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.07), 0 1px 3px rgba(0, 0, 0, 0.04);
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateX(70px);
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .edition:hover {
      box-shadow: 0 6px 28px rgba(65, 105, 237, 0.2);
      transform: translateX(5px) !important;
    }

    .edition:nth-child(1) { animation: slideIn 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) 0.9s forwards; }
    .edition:nth-child(2) { animation: slideIn 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) 1.4s forwards; }
    .edition:nth-child(3) { animation: slideIn 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) 1.9s forwards; }
    .edition:nth-child(4) { animation: slideIn 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) 2.4s forwards; }

    .edition--upcoming {
      cursor: default;
      background: rgba(255, 255, 255, 0.55);
      border: 1px dashed rgba(26, 26, 46, 0.18);
      box-shadow: none;
    }

    .edition--upcoming .edition-year,
    .edition--upcoming .edition-title {
      color: #8a93a4;
    }

    .edition--upcoming .edition-arrow {
      color: #b0b8c4;
      animation: mysteryPulse 2.2s ease-in-out infinite;
    }

    .edition--upcoming:hover {
      box-shadow: none;
      transform: translateX(0) !important;
    }

    .edition--upcoming:hover .edition-arrow {
      transform: none;
    }

    @keyframes mysteryPulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .edition-year {
      font-size: 1.6rem;
      font-weight: 900;
      color: #4169ed;
      min-width: 58px;
      line-height: 1;
    }

    .edition-info { flex: 1; }

    .edition-title {
      font-weight: 800;
      font-size: 0.95rem;
      color: #1a1a2e;
    }

    .edition-url {
      font-size: 0.72rem;
      color: #b0b8c4;
      font-family: 'Courier New', monospace;
      margin-top: 2px;
    }

    .edition-arrow {
      font-size: 1.15rem;
      color: #f05522;
      font-weight: 900;
      transition: transform 0.2s ease;
    }

    .edition:hover .edition-arrow {
      transform: translateX(4px);
    }
  </style>
</head>
<body>

  <div class="sun"></div>

  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <lottie-player
    class="pierrot"
    src="https://lottie.host/5f2ed099-4737-471d-a199-96b7786d7c88/JhebxcrsLV.json"
    background="transparent"
    speed="1"
    loop
    autoplay>
  </lottie-player>

  <div class="ground"></div>

  <div class="content">
    <h1 class="title">Les aventures de Pierrot aux Rencontres R</h1>
    <div class="editions">
      <a href="https://arthurdata.github.io/rencontresR2023" target="_blank" class="edition">
        <span class="edition-year">2023</span>
        <div class="edition-info">
          <div class="edition-title">La maquette</div>
          <div class="edition-url">arthurdata.github.io/rencontresR2023</div>
        </div>
        <span class="edition-arrow">→</span>
      </a>
      <a href="https://arthurdata.github.io/rencontresR2025" target="_blank" class="edition">
        <span class="edition-year">2025</span>
        <div class="edition-info">
          <div class="edition-title">Les tests</div>
          <div class="edition-url">arthurdata.github.io/rencontresR2025</div>
        </div>
        <span class="edition-arrow">→</span>
      </a>
      <a href="https://arthurdata.github.io/rencontresR2026" target="_blank" class="edition">
        <span class="edition-year">2026</span>
        <div class="edition-info">
          <div class="edition-title">La sécurité</div>
          <div class="edition-url">arthurdata.github.io/rencontresR2026</div>
        </div>
        <span class="edition-arrow">→</span>
      </a>
      <div class="edition edition--upcoming">
        <span class="edition-year">2027</span>
        <div class="edition-info">
          <div class="edition-title">???</div>
          <div class="edition-url">à venir...</div>
        </div>
        <span class="edition-arrow">?</span>
      </div>
    </div>
  </div>

</body>
</html>
